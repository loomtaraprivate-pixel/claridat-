<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d1f"/>
      <stop offset="100%" style="stop-color:#0a0f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:rgba(108,99,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(108,99,255,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:rgba(168,85,247,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(168,85,247,0)"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Glow blobs -->
  <ellipse cx="300" cy="200" rx="350" ry="250" fill="url(#glow1)" filter="url(#blur1)" opacity="0.8"/>
  <ellipse cx="950" cy="430" rx="280" ry="200" fill="url(#glow2)" filter="url(#blur1)" opacity="0.7"/>

  <!-- Grid lines subtle -->
  <g stroke="rgba(108,99,255,0.06)" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Border frame -->
  <rect x="40" y="40" width="1120" height="550" rx="16" ry="16" fill="none" stroke="rgba(108,99,255,0.25)" stroke-width="1.5"/>

  <!-- Top eyebrow badge -->
  <rect x="80" y="80" width="260" height="32" rx="4" fill="rgba(108,99,255,0.12)" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
  <circle cx="102" cy="96" r="5" fill="#6C63FF"/>
  <text x="117" y="101" font-family="'DM Mono', monospace, sans-serif" font-size="11" letter-spacing="2" fill="#818CF8" text-anchor="start" dominant-baseline="middle">AI-POWERED · DEFENSE COMPLIANCE</text>

  <!-- Main logo / wordmark -->
  <text x="80" y="230" font-family="'Inter', 'Rajdhani', sans-serif" font-size="96" font-weight="800" letter-spacing="-4" fill="url(#titleGrad)">CLARIDAT</text>

  <!-- Tagline -->
  <text x="82" y="295" font-family="'Inter', sans-serif" font-size="28" font-weight="400" fill="#94A3B8">Win Every DoD Contract. Without the Chaos.</text>

  <!-- Divider line -->
  <rect x="80" y="330" width="500" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>

  <!-- Feature pills row -->
  <g>
    <!-- Pill 1 -->
    <rect x="80" y="358" width="170" height="34" rx="4" fill="rgba(108,99,255,0.1)" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
    <text x="165" y="375" font-family="'Inter', sans-serif" font-size="13" fill="#A5B4FC" text-anchor="middle" dominant-baseline="middle">CMMC Level 2</text>
    
    <!-- Pill 2 -->
    <rect x="265" y="358" width="130" height="34" rx="4" fill="rgba(108,99,255,0.1)" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
    <text x="330" y="375" font-family="'Inter', sans-serif" font-size="13" fill="#A5B4FC" text-anchor="middle" dominant-baseline="middle">ITAR Compliant</text>
    
    <!-- Pill 3 -->
    <rect x="410" y="358" width="150" height="34" rx="4" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
    <text x="485" y="375" font-family="'Inter', sans-serif" font-size="13" fill="#C084FC" text-anchor="middle" dominant-baseline="middle">Auto-Generated SSP</text>
  </g>

  <!-- Key stats row -->
  <g>
    <text x="82" y="450" font-family="'Rajdhani', 'Inter', sans-serif" font-size="48" font-weight="700" fill="#FFFFFF">$39</text>
    <text x="145" y="460" font-family="'Inter', sans-serif" font-size="16" fill="#64748B">/mo</text>
    <text x="82" y="475" font-family="'Inter', sans-serif" font-size="13" fill="#6B7E94" letter-spacing="0.5">Rate locked forever</text>

    <rect x="240" y="420" width="1" height="70" fill="rgba(255,255,255,0.08)"/>

    <text x="265" y="450" font-family="'Rajdhani', 'Inter', sans-serif" font-size="48" font-weight="700" fill="#FFFFFF">4 min</text>
    <text x="265" y="475" font-family="'Inter', sans-serif" font-size="13" fill="#6B7E94" letter-spacing="0.5">Setup to compliance draft</text>

    <rect x="470" y="420" width="1" height="70" fill="rgba(255,255,255,0.08)"/>

    <text x="495" y="450" font-family="'Rajdhani', 'Inter', sans-serif" font-size="48" font-weight="700" fill="#FFFFFF">$50K</text>
    <text x="495" y="475" font-family="'Inter', sans-serif" font-size="13" fill="#6B7E94" letter-spacing="0.5">Avg consultant savings</text>
  </g>

  <!-- Right panel - deadline urgency -->
  <rect x="800" y="80" width="360" height="460" rx="12" fill="rgba(108,99,255,0.06)" stroke="rgba(108,99,255,0.2)" stroke-width="1.5"/>
  
  <!-- Red urgency dot + text -->
  <circle cx="830" cy="120" r="6" fill="#EF4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="847" y="125" font-family="'Inter', sans-serif" font-size="12" letter-spacing="1.5" fill="#FCA5A5" dominant-baseline="middle">FOUNDING OFFER CLOSING</text>

  <text x="820" y="185" font-family="'Inter', sans-serif" font-size="36" font-weight="800" fill="#FFFFFF">31 of 50</text>
  <text x="820" y="215" font-family="'Inter', sans-serif" font-size="16" fill="#6B7E94">founding spots remaining</text>

  <!-- Progress bar -->
  <rect x="820" y="235" width="320" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="820" y="235" width="122" height="8" rx="4" fill="url(#accent)"/>
  <text x="960" y="262" font-family="'DM Mono', monospace, sans-serif" font-size="11" fill="#6B7E94" text-anchor="middle">38% claimed</text>

  <!-- Deadline text -->
  <text x="820" y="305" font-family="'Inter', sans-serif" font-size="14" fill="#94A3B8">Offer closes:</text>
  <text x="820" y="335" font-family="'Inter', sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">April 5, 2026</text>
  <text x="820" y="360" font-family="'Inter', sans-serif" font-size="13" fill="#6B7E94">Early access: April 14 · Launch: April 28</text>

  <!-- CTA button shape -->
  <rect x="820" y="400" width="320" height="52" rx="50" fill="url(#accent)"/>
  <text x="980" y="426" font-family="'Inter', sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Reserve Your Founding Spot →</text>

  <!-- URL -->
  <text x="820" y="500" font-family="'DM Mono', monospace, sans-serif" font-size="13" fill="#4A5E72" letter-spacing="0.5">claridat.vercel.app</text>

  <!-- Bottom domain watermark -->
  <text x="600" y="570" font-family="'DM Mono', monospace, sans-serif" font-size="11" fill="rgba(108,99,255,0.35)" text-anchor="middle" letter-spacing="3">CLARIDAT · DEFENSE COMPLIANCE OS</text>
</svg>
